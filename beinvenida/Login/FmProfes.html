<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="FmProfes.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
     <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid text-align-center ms-3">
            <a class="navbar-brand" href="#">
             <img src="imag/LOGO_WEB-removebg-preview.png" alt="Logo" width="45" height="43" class="d-inline-block align-middle">
             <b class="brand-text">TutorNow</b>
            </a>  
        </div>
     </nav>
    </header> 

    <div class="formulario">
    <form action="#" method="post">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>
 
        <label>Apellido:</label><br>
        <input type="text" name="apellido" required><br><br>

        <label>email:</label><br>
        <input type="email" name="correo" required><br><br>
 
        <label>Teléfono:</label><br>
        <input type="tel" name="telefono"><br><br>
 
        <label>Fecha de Nacimiento:</label><br>
        <input type="date" name="fecha_nacimiento"><br><br>
 
        <label>Titulos:</label><br>
        <input type="text" name="Titulos"><br><br>
 
        <label>Area de especialidad:</label><br>
        <input type="text" name="Area_de_especialidad"><br><br>
 
        <label>Modalidad preferencial:</label><br>
        <input type="date" name="Modalidad_preferencial"><br><br>
 
        <label>Modalidad preferida:</label><br>
        <select name="modalidad">
            <option>Presencial</option>
            <option>Online</option>
        </select><br><br>

        <label>Tiempo de experiencia laboral:</label><br>
        <input type="text" name="Tiempo_de_experiencia_laboral"><br><br>
        
        <button type="submit" style="border-radius: 20px; font-size: 1.3rem">Enviar</button>
    </form>
    </div>
</body>
</html>
