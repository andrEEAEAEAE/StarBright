<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="FmEstud.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Formulario de Registro</title>
</head>
<body>
    <header>
     <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid text-align-center ms-3">
            <a class="navbar-brand" href="#">
             <img src="imag/LOGO_WEB-removebg-preview.png" alt="Logo" width="45" height="43" class="d-inline-block align-middle">
             <b class="brand-text">TutorNow</b>
            </a>  
        </div>
     </nav>
    </header> 
    <main>
        <div class="banner">
        <div class="banner-content">
            <h1>Regístrate</h1>
            <p>
                Completa el formulario para formar parte de nuestra
                próxima aventura espacial.
            </p>
        </div>
        <img src="cohete.png" class="banner-img">
    </div>
    </main>

    <div class="formulario">
    <form action="#" method="post">
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>
 
        <label>Apellido:</label><br>
        <input type="text" name="apellido" required><br><br>
 
        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Teléfono:</label><br>
        <input type="tel" name="telefono"><br><br>
 
        <label>Grado o nivel escolar:</label><br>
        <select name="grado o nivel escolar">
            <option>Premedia</option>
            <option>Media</option>
            <option>Universidad</option>
        </select><br><br>

        <label>Distrito:</label><br>
        <select name="distrito">
            <option>Atalaya</option>
            <option>Calobre</option>
            <option>Cañazas</option>
            <option>La Mesa</option>
            <option>Las Palmas</option>
            <option>Mariato</option>
            <option>Montijo</option>
            <option>Río de Jesús</option>
            <option>San Francisco</option>
            <option>Santa Fe</option>
            <option>Santiago</option>
            <option>Soná</option>
        </select><br><br>

        <label>Institucion educativa:</label><br>
        <input type="text" name="institucion_educativa"><br><br>
 
        <button type="submit" style="border-radius: 20px; font-size: 1.3rem">Enviar</button>
    </form>
    </div>
</body>
</html>
