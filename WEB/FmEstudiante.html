<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="FmEstud.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Formulario de Registro</title>
</head>
<body>
    <header>
     <nav class="navbar navbar-expand-lg bg-body-tertiary" id="navbar">
        <div class="container-fluid text-align-center ms-3">
            <a class="navbar-brand" href="#">
             <img src="imag/LOGO_WEB-removebg-preview.png" alt="Logo" width="45" height="43" class="d-inline-block align-middle">
             <b class="brand-text">TutorNow</b>
            </a>  
        </div>
     </nav>
    </header> 
    <!--BANNER-->
        <div class="container" id="banner-bg">
        <div class="banner">
        <div class="banner-content">
            <h1 style="font-size: 3rem;">Regístrate</h1>
            <p>
                Completa el formulario para que formes parte
                de un mejor futuro.
           </p>
        </div>
        
    </div>
    <img src="imag/𝐋𝐨_𝐌𝐞𝐣𝐨𝐫_𝐝𝐞_𝐀𝐫𝐜𝐚𝐧𝐨-removebg-preview.png" class="banner-img">
    </div>
<!--FORMULARIO-->
    <div class="container">
    <div class="formulario">
    <form id="formRegistro">
        <br>
        <input type="email" id="email" class="form-control" placeholder="E-mail" required><br>
        
        <div class="row">
         <div class="col-md-6">
          <input type="text"id="nombre"  class="form-control" placeholder="Nombre" required><br>
         </div>
         <div class="col-md-6">
          <input type="text" id="apellido" class="form-control" placeholder="Apellido" required> <br>
         </div>
        </div>

        <input type="password" id="password" class="form-control" placeholder="Contraseña" required> <br>
        
        <input type="tel" id="telefono" class="form-control" placeholder="Teléfono" required><br>

        <select id="distrito" class="form-select" placeholder="Distrito" required>
         <option selected>Distrito</option>
            <option>Atalaya</option>
            <option>Calobre</option>
            <option>Cañazas</option>
            <option>La Mesa</option>
            <option>Las Palmas</option>
            <option>Mariato</option>
            <option>Montijo</option>
            <option>Río de Jesús</option>
            <option>San Francisco</option>
            <option>Santa Fe</option>
            <option>Santiago</option>
            <option>Soná</option>
        </select> <br>

        <div class="row">
         <div class="col-md-6">
            <select id="grado" class="form-select" placeholder="Grado o nivel escolar" required>
            <option selected>Grado o nivel escolar</option>
            <option>Premedia</option>
            <option>Media</option>
            <option>Universidad</option>
            </select>
         </div>
         <div class="col-md-6">
            <input type="text" id="institucion" class="form-control" placeholder="Institucion educativa" required>
         </div>
        </div> 
        <br>
        <button type="submit" id="btnRegistro" style="border-radius: 20px; font-size: 1.3rem">
         Enviar
        </button>
    </form>
    </div>
    </div>

  <script>
  document.getElementById("formRegistro").addEventListener("submit", function(e){
    e.preventDefault(); 
    
    window.location.href = "home.html"; 
    });
</script>
</body>
</html>
