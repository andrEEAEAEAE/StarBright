<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="FmProfes.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <header>
     <nav class="navbar navbar-expand-lg bg-body-tertiary" id="navbar">
        <div class="container-fluid text-align-center ms-3">
            <a class="navbar-brand" href="#">
             <img src="imag/LOGO_WEB-removebg-preview.png" alt="Logo" width="45" height="43" class="d-inline-block align-middle">
             <b class="brand-text">TutorNow</b>
            </a>  
        </div>
     </nav>
    </header> 
<!--BANNER-->
    <div class="container" id="banner-bg">
        <div class="banner">
        <div class="banner-content">
            <h1 style="font-size: 2.8rem;">Regístrate</h1>
            <p>
                Completa el formulario para que formes parte
                de un mejor futuro.
           </p>
        </div>
        
    </div>
    <img src="imag/𝐋𝐨_𝐌𝐞𝐣𝐨𝐫_𝐝𝐞_𝐀𝐫𝐜𝐚𝐧𝐨-removebg-preview.png" class="banner-img">
    </div>
<!--FORMULARIO-->
    <div class="container">
    <div class="formulario">
    <form action="#" method="post">
        <br>
        <input type="email" id="email" class="form-control" placeholder="E-mail" required><br>
        
        <div class="row">
         <div class="col-md-6">
          <input type="text" id="nombre" class="form-control" placeholder="Nombre" required><br>
         </div>
         <div class="col-md-6">
          <input type="text" id="apellido" class="form-control" placeholder="Apellido" required> <br>
         </div>
        </div>

        <input type="password" id="password" class="form-control" placeholder="Contraseña" required> <br>
         
        <div class="row">
            <div class="col-md-6">
            <input type="tel" id="telefono" class="form-control" placeholder="Teléfono" required><br>
            </div>
            <div class="col-md-6">
            <input type="text" id="tarifa" class="form-control"  placeholder="Tarifa" required> <br>
            </div>
        </div>

        <label>Fecha de nacimiento:</label>
        <input type="date" id="nacimiento" class="form-control"  name="Fecha_nacimiento" required> <br>

        <div class="row">
          <div class="col-md-6">
          <input type="text" id="especializacion" class="form-control"  placeholder="Especialización en docencia" required>
          </div>
        <div class="col-md-6">
          <input type="text" id="titulos" class="form-control"  placeholder="Títulos" required>
        </div>
        </div><br>

        <div class="row">
         <div class="col-md-6">
            <select id="modalidad" class="form-select" name="Modalidad_preferida" required>
            <option selected>Modalidad preferida</option>
            <option>Presencial</option>
            <option>Online</option>
            </select>
         </div>
         <div class="col-md-6">
            <input type="text" id="laburo" class="form-control" placeholder="Años laborando" required>
         </div>
        </div> 
        <br>
        <textarea id="descripcion" class="form-control" placeholder="Escribe una breve descripción sobre ti y tu experiencia como tutor..." rows="4"></textarea>
        <br>
       <button type="submit" id="btnRegistro" style="border-radius: 20px; font-size: 1.3rem">
         Enviar
        </button>
    </form>
    </div>
 
  
</body>
</html>
