<script>
  const links = document.querySelectorAll(".nav-link");

  links.forEach(link => {
    link.addEventListener("click", function() {
      
      // quitar active de todos
      links.forEach(l => l.classList.remove("active"));
      
      // agregar active al que se clickeó
      this.classList.add("active");
    });
  });
</script>
<script>
  const OffClinks = document.querySelectorAll(".offcanvas-link");

  OffClinks.forEach(link => {
    link.addEventListener("click", function() {
      
      OffClinks.forEach(l => l.classList.remove("active"));
      
      this.classList.add("active");
    });
  });
</script>
<script>
function toggleMenu(event){
    event.preventDefault();
    document.getElementById("logoutMenu").classList.toggle("show");
}

// Cierra el menú si haces clic fuera
document.addEventListener("click", function(e){
    const menu = document.querySelector(".logout");

    if(!menu.contains(e.target)){
        document.getElementById("logoutMenu").classList.remove("show");
    }
});
</script>
