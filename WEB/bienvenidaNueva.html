<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenida</title>
<link rel="stylesheet" href="bienvenida.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header>
  <nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container-fluid text-align-center ms-5">
        <a class="navbar-brand" href="#">
            <img src="imag/LOGO_WEB-removebg-preview.png" alt="Logo" width="45" height="43" class="d-inline-block align-middle">
            <b class="brand-text">TutorNow</b>
        </a>  
    </div>
  </nav>
</header>

<section class="hero">
  <canvas id="network"></canvas>
  <div class="hero-inner">
    <div class="copy">
      <h1>Tu apoyo académico       <span class="accent">siempre contigo   </span></h1>
      <p>Conecta con tutores especializados en la materia que necesitas, agenda sesiones a tu ritmo y avanza con confianza en cada clase.</p>
      <div class="cta-row">
        <a href="Login.html" class="btn-ghost">Iniciar sesión </a>
        <a href="Choosing.html" class="btn-solid"> Registrarse </a>
      </div>
    </div>

    <div class="art">
      <div class="art-frame">
        <div class="art-placeholder">
          <img src="imag/hero-bn.png" alt="Órbita" style="display: block;">
        </div>
      </div>
    </div>
  </div>
</section>

<script>
(function(){
  const canvas = document.getElementById('network');
  const ctx = canvas.getContext('2d');
  const hero = canvas.parentElement;
  let w, h, pts = [];
  const prefersReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function resize(){
    w = canvas.width = hero.offsetWidth;
    h = canvas.height = hero.offsetHeight;
  }

  function makePoints(){
    const count = w < 700 ? 26 : 46;
    pts = [];
    for(let i=0;i<count;i++){
      pts.push({
        x: Math.random()*w*0.55,
        y: Math.random()*h,
        vx: (Math.random()-0.5)*0.15,
        vy: (Math.random()-0.5)*0.15,
        r: Math.random()*1.6+0.8
      });
    }
  }

  function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }

  function step(){
    ctx.clearRect(0,0,w,h);
    ctx.lineWidth = 1;

    for(let i=0;i<pts.length;i++){
      const p = pts[i];
      if(!prefersReduced){
        p.x += p.vx; p.y += p.vy;
        if(p.x<0||p.x>w*0.6) p.vx*=-1;
        if(p.y<0||p.y>h) p.vy*=-1;
      }
    }

    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const d = dist(pts[i],pts[j]);
        if(d < 110){
          const alpha = (1-d/110)*0.18;
          ctx.strokeStyle = `rgba(93,107,224,${alpha})`;
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.stroke();
        }
      }
    }

    for(const p of pts){
      ctx.beginPath();
      ctx.fillStyle = 'rgba(93,107,224,0.35)';
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    }

    if(!prefersReduced) requestAnimationFrame(step);
  }

  resize();
  makePoints();
  requestAnimationFrame(step);
  if(prefersReduced) step();

  window.addEventListener('resize', () => { resize(); makePoints(); if(prefersReduced) step(); });
})();
</script>

</body>
</html>
