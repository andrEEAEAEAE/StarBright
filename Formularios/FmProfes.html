<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Registro</title>
</head>
<body>
 
    <h2>Formulario de Registro</h2>
 
    <form action="#" method="post">
 
        <label>Nombre:</label><br>
        <input type="text" name="nombre" required><br><br>
 
        <label>Apellido:</label><br>
        <input type="text" name="apellido" required><br><br>

 
        <label>email:</label><br>
        <input type="email" name="correo" required><br><br>
 
        <label>Teléfono:</label><br>
        <input type="tel" name="telefono"><br><br>
 
        <label>Fecha de Nacimiento:</label><br>
        <input type="date" name="fecha_nacimiento"><br><br>
 
        <label>Titulos:</label><br>
        <input type="text" name="Titulos"><br><br>
 
        <label>Area de especialidad:</label><br>
        <input type="text" name="Area_de_especialidad"><br><br>
 
        <label>Modalidad preferencial:</label><br>
        <input type="date" name="Modalidad_preferencial"><br><br>
 
        <label>Modalidad preferida:</label><br>
        <select name="modalidad">
            <option>Presencial</option>
            <option>Online</option>
        </select><br><br>

        <label>Tiempo de experiencia laboral:</label><br>
        <input type="text" name="Tiempo_de_experiencia_laboral"><br><br>
        
 
        <button type="submit">Enviar</button>
 
    </form>
 
</body>
</html>
