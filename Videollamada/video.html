<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTutor - Videollamada</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}
 
body {
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: white;
min-height: 100vh;

}
 
.container {
max-width: 880px;
margin: 0 auto;
padding: 20px;
}
 
.card {
background: rgba(255, 255, 255, 0.95);
padding: 30px;
border-radius: 15px;
box-shadow: 0 8px 32px rgba(0, 0, 0, 0.164);
}
 
.card h2 {
color: #667eea;
margin-bottom: 20px;
font-size: 1.5em;
}
 
.video-container {
background: #000;
border-radius: 10px;
overflow: hidden;
margin-bottom: 20px;
position: relative;
aspect-ratio: 16/9;
}
 
#localVideo {
width: 100%;
height: 100%;
object-fit: cover;
background: #1a1a1a;
}
 
#remoteVideo {
width: 100%;
height: 100%;
object-fit: cover;
background: #2a2a2a;
display: none;
}
 
.video-placeholder {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
color: white;
text-align: center;
font-size: 1.2em;
}
 
.controls {
display: flex;
gap: 10px;
flex-wrap: wrap;
margin-bottom: 20px;
}
 
.btn {
padding: 12px 24px;
border: none;
border-radius: 25px;
font-size: 1em;
font-weight: 600;
cursor: pointer;
transition: all 0.3s;
flex: 1;
min-width: 120px;
}
 
.btn-primary {
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
}
 
.btn-primary:hover {
transform: translateY(-2px);
box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}
 
.btn-danger {
background: #e74c3c;
color: white;
}
 
.btn-danger:hover {
background: #c0392b;
}
 
.btn-success {
background: #2ecc71;
color: white;
}
 
.btn-success:hover {
background: #27ae60;
}
 
.btn:disabled {
opacity: 0.6;
cursor: not-allowed;
}
 
.session-info {
background: #f0f0f0;
padding: 15px;
border-radius: 10px;
margin: 20px 0;
}
 
.session-info p {
margin: 5px 0;
color: #333;
}
 
.session-code {
font-size: 2em;
font-weight: bold;
color: #667eea;
text-align: center;
letter-spacing: 2px;
}
 
.modal {
display: none;
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0, 0, 0, 0.5);
justify-content: center;
align-items: center;
z-index: 1000;
}
 
.modal-content {
background: white;
padding: 30px;
border-radius: 15px;
max-width: 500px;
width: 90%;
}
 
.modal-content h3 {
margin-bottom: 20px;
color: #667eea;
}
 
input {
width: 100%;
padding: 12px;
margin: 10px 0;
border: 2px solid #e0e0e0;
border-radius: 8px;
font-size: 1em;
}
 
input:focus {
outline: none;
border-color: #667eea;
}
</style>
</head>
<body>
<div class="container">
 
<div class="card">
<h2>Sala de Videollamada</h2>
<div class="video-container">
<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
<div class="video-placeholder" id="videoPlaceholder">
<p>Tu cámara aparecerá aquí</p>
</div>
</div>
 
<div class="controls">
<button class="btn btn-primary" id="startCallBtn" onclick="startCall()">Iniciar Cámara</button>
<button class="btn btn-success" id="joinSessionBtn" onclick="showJoinModal()">Unirse a Sesión</button>
<button class="btn btn-danger" id="endCallBtn" onclick="endCall()" disabled>Finalizar</button>
</div>
 
<div class="session-info" id="sessionInfo" style="display: none;">
<h3>Sesión Activa</h3>
<p><strong>ID de Sesión:</strong></p>
<div class="session-code" id="sessionCode">----</div>
<p style="text-align: center; margin-top: 10px; color: #666;">Comparte este código con tus estudiantes</p>
</div>
</div>
 
</div>
 
<div id="joinModal" class="modal">
<div class="modal-content">
<h3>Unirse a una Sesión</h3>
<input type="text" id="sessionIdInput" placeholder="Ingresa el ID de la sesión">
<div style="display: flex; gap: 10px; margin-top: 20px;">
<button class="btn btn-primary" onclick="joinSession()">Unirse</button>
<button class="btn btn-danger" onclick="closeJoinModal()">Cancelar</button>
</div>
</div>
</div>
 
<script>
let localStream = null;
let peerConnection = null;
let currentSessionId = null;
 
const configuration = {
iceServers: [
{ urls: 'stun:stun.l.google.com:19302' },
{ urls: 'stun:stun1.l.google.com:19302' }
]
};
 
async function startCall() {
try {
localStream = await navigator.mediaDevices.getUserMedia({
video: true,
audio: true
});
 
const localVideo = document.getElementById('localVideo');
localVideo.srcObject = localStream;
document.getElementById('videoPlaceholder').style.display = 'none';
 
currentSessionId = Math.random().toString(36).substring(7).toUpperCase();
document.getElementById('sessionCode').textContent = currentSessionId;
document.getElementById('sessionInfo').style.display = 'block';
 
document.getElementById('startCallBtn').disabled = true;
document.getElementById('endCallBtn').disabled = false;
 
alert('Cámara iniciada. ID de sesión: ' + currentSessionId + '\n\nEn una implementación real, esto se conectaría a un servidor de señalización para WebRTC.');
 
} catch (error) {
console.error('Error al acceder a la cámara:', error);
alert('No se pudo acceder a la cámara. Por favor, verifica los permisos.');
}
}
 
function showJoinModal() {
document.getElementById('joinModal').style.display = 'flex';
}
 
function closeJoinModal() {
document.getElementById('joinModal').style.display = 'none';
}
 
async function joinSession() {
const sessionId = document.getElementById('sessionIdInput').value;
if (!sessionId) {
alert('Por favor, ingresa un ID de sesión válido.');
return;
}
 
closeJoinModal();
 
alert('Intentando unirse a la sesión: ' + sessionId + '\n\nEn una implementación real, esto establecería una conexión WebRTC con el peer remoto.');
 
document.getElementById('videoPlaceholder').style.display = 'none';
document.getElementById('remoteVideo').style.display = 'block';
document.getElementById('remoteVideo').srcObject = localStream;
}
 
function endCall() {
if (localStream) {
localStream.getTracks().forEach(track => track.stop());
localStream = null;
}
 
if (peerConnection) {
peerConnection.close();
peerConnection = null;
}
 
document.getElementById('localVideo').srcObject = null;
document.getElementById('remoteVideo').srcObject = null;
document.getElementById('remoteVideo').style.display = 'none';
document.getElementById('videoPlaceholder').style.display = 'block';
document.getElementById('sessionInfo').style.display = 'none';
 
document.getElementById('startCallBtn').disabled = false;
document.getElementById('endCallBtn').disabled = true;
 
currentSessionId = null;
}
 
function createPeerConnection() {
peerConnection = new RTCPeerConnection(configuration);
 
peerConnection.onicecandidate = (event) => {
if (event.candidate) {
console.log('New ICE candidate:', event.candidate);
}
};
 
peerConnection.ontrack = (event) => {
document.getElementById('remoteVideo').srcObject = event.streams[0];
document.getElementById('remoteVideo').style.display = 'block';
document.getElementById('videoPlaceholder').style.display = 'none';
};
 
if (localStream) {
localStream.getTracks().forEach(track => {
peerConnection.addTrack(track, localStream);
});
}
}
 
window.addEventListener('beforeunload', () => {
endCall();
});
</script>
</body>
</html>
