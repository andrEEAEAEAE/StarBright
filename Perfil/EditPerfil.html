<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="perfil.css">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-body-tertiary" id="navbar">
    <div class="container-fluid ms-3">
        <a class="navbar-brand" href="#">
            <img src="imag/LOGO_WEB-removebg-preview.png" alt="Logo" width="45" height="43" class="d-inline-block align-middle">
            <b class="brand-text">TutorNow</b>
        </a>
    </div>
</nav>

<div class="container mt-5">
    <div class="perfil-card">

        <!-- FOTO Y NOMBRE -->
        <div class="text-center mb-4">
            <img id="fotoPerfil" src="imag/default-avatar.png" alt="Foto de perfil" class="foto-perfil">
            <h2 id="nombreCompleto" class="mt-3">Cargando...</h2>
            <span id="rolBadge" class="badge">--</span>
        </div>

        <!-- DATOS COMPARTIDOS (ambos roles) -->
        <div class="datos-seccion">
            <div class="dato-item">
                <span class="dato-label">📧 Correo</span>
                <span id="emailPerfil" class="dato-valor">--</span>
            </div>
            <div class="dato-item">
                <span class="dato-label">📞 Teléfono</span>
                <span id="telefonoPerfil" class="dato-valor">--</span>
            </div>
        </div>

        <!-- DATOS SOLO PROFESOR -->
        <div id="seccionProfesor" class="datos-seccion" style="display:none;">
            <h5 class="seccion-titulo">Información profesional</h5>
            <div class="dato-item">
                <span class="dato-label">🎓 Especialización</span>
                <span id="especializacionPerfil" class="dato-valor">--</span>
            </div>
            <div class="dato-item">
                <span class="dato-label">📜 Títulos</span>
                <span id="titulosPerfil" class="dato-valor">--</span>
            </div>
            <div class="dato-item">
                <span class="dato-label">💼 Años laborando</span>
                <span id="laboroPerfil" class="dato-valor">--</span>
            </div>
            <div class="dato-item">
                <span class="dato-label">🖥️ Modalidad</span>
                <span id="modalidadPerfil" class="dato-valor">--</span>
            </div>
        </div>

        <!-- DATOS SOLO ESTUDIANTE -->
        <div id="seccionEstudiante" class="datos-seccion" style="display:none;">
            <h5 class="seccion-titulo">Información académica</h5>
            <div class="dato-item">
                <span class="dato-label">📚 Grado</span>
                <span id="gradoPerfil" class="dato-valor">--</span>
            </div>
            <div class="dato-item">
                <span class="dato-label">🏫 Institución</span>
                <span id="institucionPerfil" class="dato-valor">--</span>
            </div>
            <div class="dato-item">
                <span class="dato-label">📍 Distrito</span>
                <span id="distritoPerfil" class="dato-valor">--</span>
            </div>
        </div>

        <!-- BOTÓN EDITAR -->
        <div class="text-center mt-4">
            <button id="btnEditar" class="btn-editar">✏️ Editar perfil</button>
        </div>

    </div>
</div>

<script type="module" src="perfil.js"></script>
</body>
</html>
